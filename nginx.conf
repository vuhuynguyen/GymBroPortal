# Preserve the client's ORIGINAL scheme when we sit behind another TLS-terminating proxy (e.g. Cloudflare):
# pass its X-Forwarded-Proto through; otherwise fall back to the scheme nginx itself saw. This keeps the API's
# Request.IsHttps correct so the `Secure` refresh cookie is set. (conf.d/*.conf is included in the http block,
# so this map is in a valid context.)
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    "~.+"   $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend so the SPA and API share one origin (no CORS, and the
    # httpOnly refresh cookie on /api/auth flows normally). "api" must resolve on the container network
    # (e.g. the backend docker-compose service name, or the backend's service DNS on your container host).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
