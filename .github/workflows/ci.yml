name: CI

on:
  pull_request:
  # Invoked by cd.yml as a required gate — CD won't build or deploy a commit whose CI is red.
  # No standalone push trigger: on main this runs via the CD gate, on branches via pull_request.
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Fails if the committed API client drifts from openapi.json (no-op until openapi.json is committed).
      - name: API contract drift check
        run: npm run check:api

      # Headless Chrome is preinstalled on GitHub ubuntu runners; ChromeHeadlessNoSandbox is defined in
      # karma.conf.js so the run is stable in CI sandboxes.
      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox
