<div class="flex min-w-0 flex-col gap-inv-4">
  @if (sectionLabel(); as sl) {
    <span class="text-inv-body-sm font-medium text-inv-grey-700">{{ sl }}</span>
  }
  @if (chips().length) {
    <ul class="m-0 flex list-none flex-wrap gap-2 p-0 min-w-0" role="list">
      @for (item of chips(); track item) {
        <li
          class="inv-catalog-chip inline-flex max-w-full min-w-0 items-center gap-1 font-medium"
          [class.border]="color() === 'primary'"
          [class.border-inv-primary-200]="color() === 'primary'"
          [class.bg-inv-primary-0]="color() === 'primary'"
          [class.text-inv-primary-700]="color() === 'primary'"
          [class.bg-inv-warning-0]="color() === 'warning'"
          [class.text-inv-warning-200]="color() === 'warning'"
          [class.bg-indigo-50]="color() === 'indigo'"
          [class.text-indigo-700]="color() === 'indigo'">
          <span class="min-w-0 truncate">{{ item }}</span>
          <button
            type="button"
            class="inline-flex shrink-0 cursor-pointer items-center justify-center rounded border-0 bg-transparent p-0.5 text-inherit transition-colors"
            [class.hover:bg-inv-primary-25]="color() === 'primary'"
            [class.hover:bg-amber-100]="color() === 'warning'"
            [class.hover:bg-indigo-100]="color() === 'indigo'"
            [attr.aria-label]="removeAriaLabel() + ' ' + item"
            (click)="removed.emit(item)">
            <i class="pi pi-times chip-removable-list__remove-icon leading-none text-inherit" aria-hidden="true"></i>
          </button>
        </li>
      }
    </ul>
  } @else if (showEmptyPlaceholder()) {
    <div
      class="rounded-lg border border-dashed border-inv-border-field bg-inv-grey-25 px-3 py-3 text-inv-body-sm text-inv-grey-600"
      role="status">
      {{ emptyText() }}
    </div>
  }
</div>
