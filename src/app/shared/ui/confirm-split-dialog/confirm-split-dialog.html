<ng-template #dialogTpl>
  <div
    class="ui-confirm-split-dialog ui-dialog-animate-in w-full max-w-sm overflow-hidden rounded-xl bg-inv-surface-base shadow-lg"
    role="alertdialog"
    aria-modal="true"
    [attr.aria-labelledby]="titleDomId"
    (click)="$event.stopPropagation()">
    <div class="p-6 text-center">
      <div
        class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-inv-error-0">
        <i [class]="iconClass() + ' text-2xl text-inv-error-100'" aria-hidden="true"></i>
      </div>
      <h3 [id]="titleDomId" class="mb-2 text-lg font-semibold text-inv-grey-900">
        {{ heading() }}
      </h3>
      <p class="text-sm text-inv-grey-600">{{ message() }}</p>
    </div>

    <div class="ui-dialog-ios-actions">
      <button type="button" (click)="onCancel()">{{ cancelLabel() }}</button>
      <button type="button" (click)="onConfirm()">{{ confirmLabel() }}</button>
    </div>
  </div>
</ng-template>
