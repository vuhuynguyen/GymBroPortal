<div class="fp-page">
  <div class="fp-container">

    <div class="fp-logo" aria-hidden="true">GB</div>

    @if (emailSent()) {

      <!-- Success state -->
      <div class="fp-card">
        <div class="fp-success">
          <div class="fp-success-icon">
            <i class="pi pi-check-circle" aria-hidden="true"></i>
          </div>
          <h2 class="fp-success-title">Check your email</h2>
          <p class="fp-success-body">
            We've sent a password reset link to
            <strong>{{ email() }}</strong>
          </p>
          <div class="fp-success-actions">
            <button class="fp-btn" [disabled]="loading()" (click)="resend()">
              {{ loading() ? 'Sending...' : 'Resend email' }}
            </button>
            <a class="fp-btn fp-btn--secondary" routerLink="/login">Back to sign in</a>
          </div>
        </div>
      </div>

      <p class="fp-help">
        Didn't receive the email?&nbsp;
        <button class="fp-link" (click)="resend()">Click to resend</button>
      </p>

    } @else {

      <!-- Form state -->
      <div class="fp-header">
        <h1 class="fp-title">Forgot password?</h1>
        <p class="fp-subtitle">No worries, we'll send you reset instructions</p>
      </div>

      <div class="fp-card">
        <form class="fp-form" (ngSubmit)="submit()" novalidate>

          <div class="fp-field">
            <label class="fp-label" for="fp-email">Email address</label>
            <div class="fp-input-wrap">
              <i class="pi pi-envelope fp-input-icon" aria-hidden="true"></i>
              <input
                id="fp-email"
                class="fp-input"
                type="email"
                autocomplete="email"
                placeholder="you@example.com"
                required
                [value]="email()"
                (input)="email.set($any($event.target).value)"
                [disabled]="loading()" />
            </div>
            <p class="fp-hint">Enter the email address associated with your account</p>
          </div>

          <button type="submit" class="fp-btn" [disabled]="loading()">
            @if (loading()) {
              <span class="fp-spinner" aria-hidden="true"></span>
              Sending...
            } @else {
              Send reset link
            }
          </button>

          <a class="fp-back" routerLink="/login">
            <i class="pi pi-arrow-left" aria-hidden="true"></i>
            Back to sign in
          </a>

        </form>
      </div>

    }
  </div>
</div>
