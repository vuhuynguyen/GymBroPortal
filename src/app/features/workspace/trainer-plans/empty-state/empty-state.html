<section class="tp-empty">
  <div class="tp-empty__icon">
    <i class="pi pi-calendar-times"></i>
  </div>
  <p class="tp-empty__heading">{{ title() }}</p>

      icon="pi pi-plus"
      (clicked)="createClicked.emit()" />
  }
</section>
