@if (open() && assignment(); as current) {
  <aside class="pa-edit-panel">
    <header class="pa-edit-panel__header">
      <div>
        <h3 class="m-0 text-inv-body-lg font-semibold text-inv-grey-900">Edit assignment</h3>
        <p class="m-0 mt-1 text-inv-body-sm text-inv-grey-500">
          {{ current.planName }} · v{{ current.planVersion }}
        </p>
      </div>
      <button type="button" class="pa-edit-panel__close" (click)="close()" aria-label="Close edit panel">×</button>
    </header>

    <form class="pa-edit-panel__body" [formGroup]="form" autocomplete="off">
      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <app-form-field label="Start date">
          <app-input type="date" formControlName="startDate" />
        </app-form-field>
        <app-form-field label="End date" [errorMessage]="endDateError()">
          <app-input type="date" formControlName="endDate" />
        </app-form-field>
      </div>

      <fieldset class="pa-fieldset">
        <legend>Visibility mode</legend>
        <label><input type="radio" formControlName="visibilityMode" value="Full" /> Full access</label>
        <label><input type="radio" formControlName="visibilityMode" value="Guided" /> Guided</label>
        <label><input type="radio" formControlName="visibilityMode" value="Blind" /> Blind</label>
      </fieldset>

      <div class="pa-check-list">
        <label><input type="checkbox" formControlName="hideMacroTargets" /> Hide macro targets</label>
        <label><input type="checkbox" formControlName="disableTraineeEditing" /> Disable trainee editing</label>
      </div>
    </form>

    <footer class="pa-edit-panel__footer">
      <app-button label="Save changes" icon="pi pi-check" [loading]="saving()" [disabled]="saving()" (clicked)="save()" />
    </footer>
  </aside>
}
